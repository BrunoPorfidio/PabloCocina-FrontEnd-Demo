
<!DOCTYPE html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>PabloCocina - Pedidos Gastronómicos</title>
    <meta name="description" content="Hacé tu pedido gastronómico en PabloCocina. Platos del día, guarniciones y más. Envío directo a tu mesa o take away." />
    <meta name="theme-color" content="#0d1117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- CSP: Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://esm.sh https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' http://localhost:8080 https://api.cloudinary.com; frame-src 'none';" />

    <!-- CRITICAL POLYFILL: Fixes "Uncaught ReferenceError: global is not defined" from sockjs-client -->

      if (typeof global === 'undefined') {
        window.global = window;
      }
    </script>

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://esm.sh">
    <link rel="preconnect" href="https://picsum.photos">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Tailwind CSS v3 via CDN (cdn.tailwindcss.com redirects to 3.4.x) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], display: ['Playfair Display', 'serif'] },
            colors: { 'gray-750': '#2d3748', 'gray-850': '#1a202c', 'gray-950': '#0d1117' }
          }
        }
      }
    </script>

    <!-- Fonts: Inter + Playfair Display for personality -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700&display=swap" media="print" onload="this.media='all'" />

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="/src/assets/logo.png" />
    <link rel="apple-touch-icon" href="/src/assets/logo.png" />
